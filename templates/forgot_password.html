<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Reset Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f8f9fa;}</style></head><body>
<div style="max-width:440px;margin:4rem auto;padding:0 1rem;">
<div class="card p-4" style="border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1)">
<h2 class="fw-bold mb-1">🔐 Reset Password</h2>
<p class="text-muted small mb-3">Enter your email address to get a reset link.</p>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="alert alert-{% if cat=='error' %}danger{% else %}success{% endif %} py-2 small">{{ msg }}</div>
  {% endfor %}
{% endwith %}
<form method="POST">
<div class="mb-3"><label class="form-label fw-bold small">Email Address</label>
<input class="form-control" type="email" name="email" required autofocus placeholder="your@email.com"></div>
<button class="btn btn-primary w-100 fw-bold">Get Reset Link →</button>
</form>
<p class="text-center mt-3 small"><a href="/store/login">← Back to Sign In</a></p>
</div></div></body></html>
