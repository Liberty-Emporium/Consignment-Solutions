<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Store Login | Consignment Solutions</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;}
h1{color:#fff;font-size:1.6rem;text-align:center;margin-bottom:0.2rem;}h1 span{color:#f59e0b;}
.sub{color:#94a3b8;text-align:center;margin-bottom:1.8rem;font-size:0.85rem;}
label{display:block;color:#cbd5e1;font-weight:600;margin-bottom:0.35rem;font-size:0.83rem;}
input{width:100%;padding:0.75rem;border:1.5px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.08);color:#fff;font-size:0.95rem;margin-bottom:1.1rem;}
input::placeholder{color:#64748b;}input:focus{outline:none;border-color:#f59e0b;}
.btn{width:100%;padding:0.85rem;background:#f59e0b;color:#1a1a2e;border:none;border-radius:10px;font-size:1rem;font-weight:800;cursor:pointer;}
.link{text-align:center;margin-top:1rem;color:#94a3b8;font-size:0.82rem;}
.link a{color:#f59e0b;text-decoration:none;}
.alert{padding:0.7rem;border-radius:8px;margin-bottom:0.8rem;background:rgba(239,68,68,0.15);color:#fca5a5;font-size:0.83rem;}
</style></head><body>
<div class="box">
  <h1>Consignment <span>Solutions</span></h1>
  <p class="sub">Store Admin Login</p>
  {% with messages = get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="alert">{{ m }}</div>{% endfor %}{% endwith %}
  <form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label>Email</label><input type="email" name="email" placeholder="store@email.com" required>
    <label>Password</label><input type="password" name="password" placeholder="Password" required>
    <button class="btn">Login →</button>
  </form>
    <p style="text-align:center; margin-top:1rem; font-size:0.82rem; color:#94a3b8;">Forgot your password? <a href="/forgot-password" style="color:#6366f1; font-weight:700;">Reset it →</a></p>

  <div class="link">No account? <a href="/signup">Start free trial</a> · <a href="/vendor/login">Vendor login</a></div>
</div>
</body></html>
