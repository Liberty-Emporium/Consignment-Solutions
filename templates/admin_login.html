<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin Login | Consignment Solutions</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a5f);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:2.5rem;width:380px;}
h1{color:#fff;text-align:center;margin-bottom:0.3rem;font-size:1.5rem;}span{color:#f59e0b;}
.sub{color:#94a3b8;text-align:center;margin-bottom:1.8rem;font-size:0.82rem;}
label{display:block;color:#cbd5e1;font-size:0.82rem;font-weight:600;margin-bottom:0.3rem;}
input{width:100%;padding:0.72rem;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.07);color:#fff;font-size:0.93rem;margin-bottom:1rem;}
.btn{width:100%;padding:0.82rem;background:#f59e0b;color:#1a1a2e;border:none;border-radius:8px;font-size:0.95rem;font-weight:800;cursor:pointer;}
.alert{padding:0.65rem;background:rgba(239,68,68,0.15);color:#fca5a5;border-radius:8px;margin-bottom:0.8rem;font-size:0.83rem;}
</style></head><body>
<div class="box">
  <h1><span>Platform</span> Admin</h1>
  <p class="sub">Consignment Solutions</p>
  {% with messages = get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="alert">{{ m }}</div>{% endfor %}{% endwith %}
  <form method="POST">
    <label>Email</label><input type="email" name="email" required>
    <label>Password</label><input type="password" name="password" required>
    <button class="btn">Login</button>
  </form>
    <p style="text-align:center; margin-top:1rem; font-size:0.82rem; color:#94a3b8;">Forgot your password? <a href="/forgot-password" style="color:#6366f1; font-weight:700;">Reset it →</a></p>

</div>
</body></html>
