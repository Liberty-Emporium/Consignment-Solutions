<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vendor Login | Consignment Solutions</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f3460,#16213e);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;}
h1{color:#fff;font-size:1.6rem;text-align:center;margin-bottom:0.2rem;}h1 span{color:#10b981;}
.sub{color:#94a3b8;text-align:center;margin-bottom:1.8rem;font-size:0.85rem;}
label{display:block;color:#cbd5e1;font-weight:600;margin-bottom:0.35rem;font-size:0.83rem;}
input{width:100%;padding:0.75rem;border:1.5px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.08);color:#fff;font-size:0.95rem;margin-bottom:1.1rem;}
input::placeholder{color:#64748b;}input:focus{outline:none;border-color:#10b981;}
.btn{width:100%;padding:0.85rem;background:#10b981;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:800;cursor:pointer;}
.link{text-align:center;margin-top:1rem;color:#94a3b8;font-size:0.82rem;}.link a{color:#10b981;text-decoration:none;}
.alert{padding:0.7rem;border-radius:8px;margin-bottom:0.8rem;background:rgba(239,68,68,0.15);color:#fca5a5;font-size:0.83rem;}
</style></head><body>
<div class="box">
  <h1>Vendor <span>Portal</span></h1>
  <p class="sub">Sign in to manage your inventory</p>
  {% with messages = get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="alert">{{ m }}</div>{% endfor %}{% endwith %}
  <form method="POST">
    <label>Email</label><input type="email" name="email" placeholder="your@email.com" required>
    <label>Password</label><input type="password" name="password" placeholder="Password" required>
    <button class="btn">Login →</button>
  </form>
  <div class="link"><a href="/store/login">Store admin login</a></div>
</div>
</body></html>
