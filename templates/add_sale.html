{% extends 'base.html' %}{% block title %}Record Sale{% endblock %}{% block content %}
<div class="ph"><h1>💲 Record a Sale</h1></div>
<div class="card" style="max-width:500px;"><form method="POST">
<div class="fg"><label>Vendor</label><select name="vendor_id" id="vsel" required><option value="">— Select —</option>{% for v in vendors %}<option value="{{ v.id }}">{{ v.name }}</option>{% endfor %}</select></div>
<div class="fg"><label>Item (optional — link to inventory)</label><select name="item_id" id="isel" onchange="fill()"><option value="">— Manual entry —</option>{% for i in items %}<option value="{{ i.id }}" data-v="{{ i.vendor_id }}" data-p="{{ i.price }}" data-n="{{ i.name }}">{{ i.vendor_name }} — {{ i.name }}</option>{% endfor %}</select></div>
<div class="fg"><label>Item Name (if not linked)</label><input name="item_name" id="iname"></div>
<div class="g2"><div class="fg"><label>Unit Price ($)</label><input type="number" name="unit_price" id="price" step="0.01" required></div>
<div class="fg"><label>Quantity</label><input type="number" name="quantity" value="1" min="1"></div></div>
<div class="fg"><label>Sale Date</label><input type="date" name="sale_date" value="{{ today }}" required></div>
<button type="submit" class="btn btn-p">Record Sale</button> <a href="/sales" class="btn btn-g">Cancel</a>
</form></div>
<script>function fill(){const s=document.getElementById('isel'),o=s.options[s.selectedIndex];if(o.value){document.getElementById('price').value=o.dataset.p;document.getElementById('iname').value=o.dataset.n;document.getElementById('vsel').value=o.dataset.v;}}</script>
{% endblock %}
